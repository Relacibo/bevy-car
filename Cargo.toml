[package]
name = "bevy-car"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18" }
bevy_rapier3d = { version = "0.33.0" }
serde_json = "1.0"
libm = "0.2"

[target.'cfg(target_arch = "wasm32")']
runner = "wasm-server-runner"

[profile.release]
lto = true
opt-level = 's'

[profile.dev.package."*"]
opt-level = 3
